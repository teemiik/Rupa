name: Android

# build runs on pushes to master and on PRs; deploy only on pushes to master.
# A merged PR produces a push event on master, so this covers both of your cases.
# https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows
on:
  push:
    branches: [ master ]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref (keeps PR feedback fast).
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release AAB + APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.4

      - name: Run unit tests
        # Fail fast: don't build/package if core tests are red.
        run: ./gradlew core:test

      - name: SpotBugs (report-only)
        # Static analysis of core. ignoreFailures=true in core/build.gradle, so this
        # never breaks the build — the HTML/XML report is uploaded for review.
        run: ./gradlew core:spotbugsMain

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spotbugs-report
          path: core/build/reports/spotbugs/
          if-no-files-found: ignore

      - name: Compute version
        # versionCode must strictly exceed the highest one already in the Play Store
        # (currently 8). The offset keeps it monotonic across runs.
        run: |
          echo "VERSION_CODE=$((8 + ${GITHUB_RUN_NUMBER}))" >> "$GITHUB_ENV"
          echo "VERSION_NAME=1.0.$((7 + ${GITHUB_RUN_NUMBER}))" >> "$GITHUB_ENV"

      # Secrets are unavailable on PRs (especially from forks). Only wire up the
      # release keystore on pushes to master; on PRs the build falls back to the
      # debug signing config (still exercises full release compilation + ProGuard).
      - name: Decode signing keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          printf '%s' "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "SIGNING_KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build release AAB + APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        # Single Gradle invocation: R8/minify runs once, both outputs are signed
        # with the release keystore (debug fallback on PRs) for direct install.
        run: ./gradlew android:bundleRelease android:assembleRelease --stacktrace

      - name: Upload build outputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-build-outputs
          path: |
            android/build/outputs/bundle/release/*.aab
            android/build/outputs/apk/release/*.apk
            android/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error

  deploy:
    name: Deploy to Google Play (internal)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Download build outputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-build-outputs
          path: outputs

      - name: Deploy to Google Play (internal track)
        # SHA-pinned for supply-chain safety (tag v1 -> v1.1.5). Dependabot bumps the SHA.
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.circlesandholes.game
          releaseFiles: outputs/bundle/release/*.aab
          mappingFile: outputs/mapping/release/mapping.txt
          track: internal
          status: completed
